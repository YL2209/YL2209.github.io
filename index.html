<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Naokuo的主页</title>
  <style type="text/css">
    * {
      margin: 0;
      padding: 0;
      transition: 0.7s;
      -webkit-tap-highlight-color: rgba(0, 0, 0, 0);
    }

    body {
      background-color: #fffef9;
    }

    video.Bg_Video {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      background: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAABmJLR0QA/wD/AP+gvaeTAAAACXBIWXMAAAsTAAALEwEAmpwYAAAAKUlEQVQImU3IMREAIAgAwJfNkQCEsH8cijjpMf6vnXlQaIiJFx+omEBfmqIEZLe2jzcAAAAASUVORK5CYII=");
    }

    #naokuo-home_bg {
      width: 100%;
      height: 100vh;
      position: fixed;
      z-index: -999;
      overflow: hidden;
      display: block;
      -webkit-animation: naokuo_blur-to-clear 2.5s cubic-bezier(0.6, 0.25, 0.25, 1) 0s 1 backwards, naokuo_scale 2.2s cubic-bezier(0.6, 0.1, 0.25, 1) 0.5s 1 backwards;
      -moz-animation: naokuo_blur-to-clear 2.5s cubic-bezier(0.6, 0.25, 0.25, 1) 0s 1 backwards, naokuo_scale 2.2s cubic-bezier(0.6, 0.1, 0.25, 1) 0.5s 1 backwards;
      -o-animation: naokuo_blur-to-clear 2.5s cubic-bezier(0.6, 0.25, 0.25, 1) 0s 1 backwards, naokuo_scale 2.2s cubic-bezier(0.6, 0.1, 0.25, 1) 0.5s 1 backwards;
      -ms-animation: naokuo_blur-to-clear 2.5s cubic-bezier(0.6, 0.25, 0.25, 1) 0s 1 backwards, naokuo_scale 2.2s cubic-bezier(0.6, 0.1, 0.25, 1) 0.5s 1 backwards;
      animation: naokuo_blur-to-clear 2.5s cubic-bezier(0.6, 0.25, 0.25, 1) 0s 1 backwards, naokuo_scale 2.2s cubic-bezier(0.6, 0.1, 0.25, 1) 0.5s 1 backwards;
    }

    @-moz-keyframes naokuo_blur-to-clear {
      0% {
        filter: blur(50px);
      }

      100% {
        filter: blur(0);
      }
    }

    @-webkit-keyframes naokuo_blur-to-clear {
      0% {
        filter: blur(50px);
      }

      100% {
        filter: blur(0);
      }
    }

    @-o-keyframes naokuo_blur-to-clear {
      0% {
        filter: blur(50px);
      }

      100% {
        filter: blur(0);
      }
    }

    @keyframes naokuo_blur-to-clear {
      0% {
        filter: blur(50px);
      }

      100% {
        filter: blur(0);
      }
    }

    @-moz-keyframes naokuo_scale {
      0% {
        -webkit-transform: scale(1.65);
        -moz-transform: scale(1.65);
        -o-transform: scale(1.65);
        -ms-transform: scale(1.65);
        transform: scale(1.65);
        opacity: 0;
        -ms-filter: "progid:DXImageTransform.Microsoft.Alpha(Opacity=0)";
        filter: alpha(opacity=0);
      }

      100% {
        -webkit-transform: none;
        -moz-transform: none;
        -o-transform: none;
        -ms-transform: none;
        transform: none;
        opacity: 1;
        -ms-filter: none;
        filter: none;
      }
    }

    @-webkit-keyframes naokuo_scale {
      0% {
        -webkit-transform: scale(1.65);
        -moz-transform: scale(1.65);
        -o-transform: scale(1.65);
        -ms-transform: scale(1.65);
        transform: scale(1.65);
        opacity: 0;
        -ms-filter: "progid:DXImageTransform.Microsoft.Alpha(Opacity=0)";
        filter: alpha(opacity=0);
      }

      100% {
        -webkit-transform: none;
        -moz-transform: none;
        -o-transform: none;
        -ms-transform: none;
        transform: none;
        opacity: 1;
        -ms-filter: none;
        filter: none;
      }
    }

    @-o-keyframes naokuo_scale {
      0% {
        -webkit-transform: scale(1.65);
        -moz-transform: scale(1.65);
        -o-transform: scale(1.65);
        -ms-transform: scale(1.65);
        transform: scale(1.65);
        opacity: 0;
        -ms-filter: "progid:DXImageTransform.Microsoft.Alpha(Opacity=0)";
        filter: alpha(opacity=0);
      }

      100% {
        -webkit-transform: none;
        -moz-transform: none;
        -o-transform: none;
        -ms-transform: none;
        transform: none;
        opacity: 1;
        -ms-filter: none;
        filter: none;
      }
    }

    @keyframes naokuo_scale {
      0% {
        -webkit-transform: scale(1.65);
        -moz-transform: scale(1.65);
        -o-transform: scale(1.65);
        -ms-transform: scale(1.65);
        transform: scale(1.65);
        opacity: 0;
        -ms-filter: "progid:DXImageTransform.Microsoft.Alpha(Opacity=0)";
        filter: alpha(opacity=0);
      }

      100% {
        -webkit-transform: none;
        -moz-transform: none;
        -o-transform: none;
        -ms-transform: none;
        transform: none;
        opacity: 1;
        -ms-filter: none;
        filter: none;
      }
    }
  </style>
</head>

<body>

  <div id="naokuo-home_bg">
    <video class="Bg_Video" width="100%" height="100%" style="object-fit:cover;z-index:0" preload="auto" autoplay=""
      loop="" muted="" playsinline="" webkit-playsinline="" x5-playsinline="" x5-video-player-type="h5"
      x5-video-player-fullscreen="" x5-video-orientation="portraint" x-webkit-airplay="allow">
      <source src="https://cdn.cbd.int/naokuo-media@1.0.3/MP4/2024-01-19_5.mp4" type="video/mp4">
    </video>
  </div>

  <script>

  </script>

</body>

</html>
